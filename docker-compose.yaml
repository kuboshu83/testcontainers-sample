services:
  app:
    image: com.example.k83/test-sample-app:0.1.0
    container_name: app
    depends_on:
      - app-db
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - test-nw

  app-db:
    build:
      context: ./container
      dockerfile: Dockerfile
    image: com.example.k83/test-sample-db:0.1.0
    container_name: app-db
    volumes:
      - "test-sample-db-data:/var/lib/postgresql"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
    networks:
      - test-nw

volumes:
  test-sample-db-data:

networks:
  test-nw: